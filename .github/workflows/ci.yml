name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12

  tests:
    runs-on: ubuntu-latest
    needs: lint
    if: success()
    steps:
      - uses: actions/checkout@v6

      - name: Setup go
        uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Run storage tests
        run: |
          cd tests/storage
          go test -v .

  build:
    runs-on: ubuntu-latest
    needs: tests
    if: success()
    steps:
      - uses: actions/checkout@v6

      - name: Build image
        run: |
          docker build -t auth-service .